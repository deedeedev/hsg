# Stale bot configuration — closes inactive issues and PRs.
daysUntilStale: 60
daysUntilClose: 7
exemptLabels:
  - pinned
  - security
  - "good first issue"
staleLabel: stale
pulls:
  daysUntilStale: 30
  daysUntilClose: 7
  exemptLabels:
    - pinned
    - "needs review"
issues:
  daysUntilStale: 60
  daysUntilClose: 7
  exemptLabels:
    - pinned
    - "needs triage"
markComment: >
  This issue has been inactive for 60 days and will be closed in 7 days
  unless there is further activity. Comment to remove the `stale` label.
closeComment: >
  Closing due to inactivity. Reopen if still relevant.
