site_name: hsg documentation
site_description: Chinese text coverage analysis and comprehensible sentence mining.
site_url: https://davide.github.io/hsg/
repo_url: https://github.com/davide/hsg
repo_name: davide/hsg

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Usage: usage.md
  - API Reference:
      - hsg.classes: api/classes.md
      - hsg.utils: api/utils.md
      - hsg.commands: api/commands.md
  - Data Sources: data-sources.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            merge_init_into_class: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
